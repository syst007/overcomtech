name: Deploy to Cloud

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/amd64, linux/arm/v8
        tags: ${{ secrets.DOCKER_USERNAME }}/myappsocials:latest

    - name: Space Rebuild
      run: |
        curl -X POST "https://huggingface.co/${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }}/restart" \
        -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
